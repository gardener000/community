<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - 牛客社区</title>
</head>
<body>
<h2>注册账号</h2>
<form method="post" th:action="@{/register}">
    <div>
        账号：<input type="text" name="username" th:value="${user!=null?user.username:''}">
        <span style="color:red;" th:text="${usernameMsg}">错误提示</span>
    </div>
    <div>
        密码：<input type="password" name="password">
        <span style="color:red;" th:text="${passwordMsg}">错误提示</span>
    </div>
    <div>
        邮箱：<input type="email" name="email" th:value="${user!=null?user.email:''}">
        <span style="color:red;" th:text="${emailMsg}">错误提示</span>
    </div>
    <button type="submit">立即注册</button>
</form>
</body>
</html>
